name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build merge-base manifest and detect changed models
  # ---------------------------------------------------------------------------
  setup_env:
    name: Setup & Detect Changes
    runs-on: ubuntu-latest

    outputs:
      changed_models: ${{ steps.diff.outputs.changed_models }}
      has_changes: ${{ steps.diff.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ci-init
        uses: ./.github/actions/dbt-ci-init

      - name: Build merge-base manifest (state baseline)
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate

          # Compute merge-base with main
          BASE_SHA=$(git merge-base ${{ github.sha }} origin/main)
          echo "Using BASE_SHA=$BASE_SHA as state baseline"

          # Materialize the base tree into a sibling folder
          mkdir -p ../../dbt_base
          git -C "$(git rev-parse --show-toplevel)" archive "$BASE_SHA" | tar -x -C ../../dbt_base

          # Parse the baseline project to produce its manifest (use prod target
          # so dbt clone can resolve production schema locations)
          cd ../../dbt_base/dbt
          source ../../skytrax_reviews_transformation/dbt_venv/bin/activate
          dbt deps --profiles-dir ./
          dbt parse --profiles-dir ./ --target prod

          # Copy manifest back for state comparison
          cd ../../skytrax_reviews_transformation/dbt
          mkdir -p base_state
          cp ../../dbt_base/dbt/target/manifest.json base_state/manifest.json

      - name: Detect changed models
        id: diff
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate

          # Parse current project
          dbt parse --profiles-dir ./ --target staging

          # Check if macro files changed in this PR
          BASE_SHA=$(git merge-base ${{ github.sha }} origin/main)
          MACRO_CHANGES=$(git diff --name-only "$BASE_SHA" ${{ github.sha }} -- "macros/" | wc -l | xargs)

          # Use merge-base manifest to find changed/new models
          dbt ls \
            --profiles-dir ./ \
            --state base_state \
            --resource-type model \
            --select "state:modified" "state:new" \
            --output name \
            --target staging \
            --quiet \
            > changed_models.txt 2>/dev/null || true

          # If macros changed but no models were detected, select all models
          # (macro changes affect dependent models but dbt state comparison
          # may not always catch them)
          CHANGED=$(tr '\n' ' ' < changed_models.txt | xargs)
          if [ -z "$CHANGED" ] && [ "$MACRO_CHANGES" -gt 0 ]; then
            echo "Macro files changed but no models detected -- selecting all models"
            dbt ls \
              --profiles-dir ./ \
              --resource-type model \
              --output name \
              --target staging \
              --quiet \
              > changed_models.txt 2>/dev/null || true
            CHANGED=$(tr '\n' ' ' < changed_models.txt | xargs)
          fi

          echo "---- Changed models ----"
          cat changed_models.txt || true

          echo "changed_models=$CHANGED" >> "$GITHUB_OUTPUT"

          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload base manifest
        uses: actions/upload-artifact@v4
        with:
          name: base_manifest
          path: dbt/base_state/manifest.json
          retention-days: 3

      - name: Upload changed models list
        uses: actions/upload-artifact@v4
        with:
          name: changed_models
          path: dbt/changed_models.txt
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Job 2: Lint changed SQL files with sqlfluff
  # ---------------------------------------------------------------------------
  lint_sql:
    name: Lint SQL
    runs-on: ubuntu-latest
    needs: setup_env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ci-init
        uses: ./.github/actions/dbt-ci-init

      - name: Run sqlfluff on changed SQL files
        run: |
          source dbt_venv/bin/activate

          BASE_SHA=$(git merge-base ${{ github.sha }} origin/main)
          changed_files=$(git diff --name-only --diff-filter=AM "$BASE_SHA" ${{ github.sha }} -- "*.sql" | tr '\n' ' ')

          if [ -n "$changed_files" ]; then
            echo "Linting changed files: $changed_files"
            sqlfluff lint $changed_files || true
          else
            echo "No changed SQL files to lint."
          fi

  # ---------------------------------------------------------------------------
  # Job 3: Compile changed models
  # ---------------------------------------------------------------------------
  compile_changed:
    name: Compile Changed Models
    runs-on: ubuntu-latest
    needs: setup_env
    if: needs.setup_env.outputs.has_changes == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ci-init
        uses: ./.github/actions/dbt-ci-init
        with:
          download_changed_models: "true"

      - name: Compile changed models
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate

          MODELS="${{ needs.setup_env.outputs.changed_models }}"
          if [ -n "$MODELS" ]; then
            echo "Compiling: $MODELS"
            dbt compile --profiles-dir ./ --select $MODELS --target staging
          else
            echo "No changed models to compile."
          fi

  # ---------------------------------------------------------------------------
  # Job 4: Run changed models with --defer to base state
  # ---------------------------------------------------------------------------
  run_changed:
    name: Run Changed Models
    runs-on: ubuntu-latest
    needs: [setup_env, compile_changed]
    if: needs.setup_env.outputs.has_changes == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ci-init
        uses: ./.github/actions/dbt-ci-init
        with:
          download_changed_models: "true"
          download_base_manifest: "true"

      - name: Clone production tables to staging
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate
          dbt clone \
            --profiles-dir ./ \
            --state base_state \
            --target staging

      - name: Run changed models
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate

          MODELS="${{ needs.setup_env.outputs.changed_models }}"
          if [ -n "$MODELS" ]; then
            echo "Running: $MODELS"
            dbt run \
              --profiles-dir ./ \
              --select $MODELS \
              --target staging \
              --fail-fast
          else
            echo "No changed models to run."
          fi

  # ---------------------------------------------------------------------------
  # Job 5: Test changed models
  # ---------------------------------------------------------------------------
  test_changed:
    name: Test Changed Models
    runs-on: ubuntu-latest
    needs: [setup_env, run_changed]
    if: needs.setup_env.outputs.has_changes == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ci-init
        uses: ./.github/actions/dbt-ci-init
        with:
          download_changed_models: "true"

      - name: Test changed models
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate

          MODELS="${{ needs.setup_env.outputs.changed_models }}"
          if [ -n "$MODELS" ]; then
            echo "Testing: $MODELS"
            dbt test \
              --profiles-dir ./ \
              --select $MODELS \
              --target staging
          else
            echo "No changed models to test."
          fi

  # ---------------------------------------------------------------------------
  # Job 6: Run downstream models of changed models
  # ---------------------------------------------------------------------------
  run_downstream:
    name: Run Downstream Models
    runs-on: ubuntu-latest
    needs: [setup_env, run_changed]
    if: needs.setup_env.outputs.has_changes == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ci-init
        uses: ./.github/actions/dbt-ci-init
        with:
          download_changed_models: "true"

      - name: Run downstream models
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate

          MODELS="${{ needs.setup_env.outputs.changed_models }}"
          if [ -n "$MODELS" ]; then
            # Build selection: append + to each model for downstream selection,
            # then exclude the changed models themselves (already run in Job 4)
            SELECT_ARGS=""
            EXCLUDE_ARGS=""
            for model in $MODELS; do
              SELECT_ARGS="$SELECT_ARGS ${model}+"
              EXCLUDE_ARGS="$EXCLUDE_ARGS $model"
            done

            echo "Running downstream of: $MODELS"
            dbt run \
              --profiles-dir ./ \
              --select $SELECT_ARGS \
              --exclude $EXCLUDE_ARGS \
              --target staging \
              --fail-fast
          else
            echo "No changed models — skipping downstream run."
          fi

  # ---------------------------------------------------------------------------
  # Job 7: Test downstream models of changed models
  # ---------------------------------------------------------------------------
  test_downstream:
    name: Test Downstream Models
    runs-on: ubuntu-latest
    needs: [setup_env, run_downstream]
    if: needs.setup_env.outputs.has_changes == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ci-init
        uses: ./.github/actions/dbt-ci-init
        with:
          download_changed_models: "true"

      - name: Test downstream models
        working-directory: ./dbt
        run: |
          source ../dbt_venv/bin/activate

          MODELS="${{ needs.setup_env.outputs.changed_models }}"
          if [ -n "$MODELS" ]; then
            SELECT_ARGS=""
            EXCLUDE_ARGS=""
            for model in $MODELS; do
              SELECT_ARGS="$SELECT_ARGS ${model}+"
              EXCLUDE_ARGS="$EXCLUDE_ARGS $model"
            done

            echo "Testing downstream of: $MODELS"
            dbt test \
              --profiles-dir ./ \
              --select $SELECT_ARGS \
              --exclude $EXCLUDE_ARGS \
              --target staging
          else
            echo "No changed models — skipping downstream tests."
          fi
