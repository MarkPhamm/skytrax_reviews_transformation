[sqlfluff]
dialect = snowflake
templater = dbt
runaway_limit = 10
max_line_length = 140
indent_unit = space
exclude_rules = RF04, ST06
large_file_skip_byte_limit = 30000
# keyword reservation rule (RF04): We exclude this rule due to collisions between business terms and minor sql reserved keywords 
# column ordering rule (ST06): Column ordering is sometimes more important to us than always having aggregations listed last

[sqlfluff:indentation]
tab_space_size = 4
allow_implicit_indents = True
indented_on_contents = False

[sqlfluff:layout:type:comma] # touching trailing commas
spacing_before = touch 
line_position = trailing

[sqlfluff:rules:aliasing.table] # table aliases required but do not need to be the exact table name
aliasing = implicit

[sqlfluff:rules:aliasing.column] # required 
aliasing = explicit

[sqlfluff:rules:aliasing.expression] # when using agg functions aliasing required 
allow_scalar = False

[sqlfluff:rules:capitalisation.keywords] 
capitalisation_policy = lower

[sqlfluff:rules:capitalisation.identifiers] 
extended_capitalisation_policy = lower

[sqlfluff:rules:capitalisation.functions]
capitalisation_policy = lower
extended_capitalisation_policy = lower

[sqlfluff:rules:capitalisation.literals]
capitalisation_policy = lower

[sqlfluff:rules:convention.casting_style]   # Cast using ::, not `cast <col> as <type>`
preferred_type_casting_style = shorthand

[sqlfluff:rules:ambiguous.column_references]  # Number in group by, number in order by
group_by_and_order_by_style = consistent

[sqlfluff:rules:references.quoting]
ignore_words = state

[sqlfluff:templater:dbt]
project_dir = ./